name: Build and Deploy

# Run this pipeline when code is pushed to main branch
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log into Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build the Docker image and push to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio:${{ github.sha }}

      # Step 4: SSH into EC2 and deploy the new image
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image from Docker Hub
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio:latest

            # Stop and remove old container (|| true means don't fail if it doesn't exist)
            sudo docker stop portfolio || true
            sudo docker rm portfolio || true

            # Start new container with the updated image
            sudo docker run -d \
              -p 5000:5000 \
              --restart=always \
              --name portfolio \
              ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio:latest

            # Clean up old unused images to save disk space
            sudo docker image prune -f