version: '3.8'

services:
  # Prometheus - collects and stores metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"           # Access Prometheus at localhost:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'  # Allow config reload without restart
    restart: unless-stopped

  # Grafana - visualizes the metrics Prometheus collects
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"           # Access Grafana at localhost:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123    # Login password
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus             # Start Prometheus before Grafana
    restart: unless-stopped

volumes:
  prometheus_data:            # Persists Prometheus data
  grafana_data:               # Persists Grafana dashboards